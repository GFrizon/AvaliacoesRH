<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sem conexão — Avaliações RH</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('theme') || 'light';
                var resolved = stored === 'system'
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : stored;
                document.documentElement.setAttribute('data-theme', resolved);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        :root, [data-theme="light"] {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --border: #e2e4e9;
            --fg: #14171f;
            --fg-muted: #5b6472;
            --primary: #4338ca;
            --primary-fg: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #121317;
            --surface: #1a1c21;
            --border: #2a2c33;
            --fg: #e8e9ec;
            --fg-muted: #a2a7b3;
            --primary: #7c6df2;
            --primary-fg: #14171f;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
            padding-top: max(1.5rem, env(safe-area-inset-top));
            background: var(--bg);
            color: var(--fg);
            font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        .card {
            width: 100%;
            max-width: 26rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .icon {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 1rem;
            border-radius: 0.5rem;
            background: var(--border);
            display: grid;
            place-items: center;
        }
        h1 { font-size: 1.125rem; margin: 0 0 0.5rem; }
        p { color: var(--fg-muted); font-size: 0.9rem; line-height: 1.5; margin: 0 0 1.5rem; }
        button {
            appearance: none;
            border: none;
            border-radius: 0.5rem;
            background: var(--primary);
            color: var(--primary-fg);
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.625rem 1.25rem;
            min-height: 2.75rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12" y2="20"></line>
            </svg>
        </div>
        <h1>Você está sem conexão</h1>
        <p>Não foi possível carregar esta página. Verifique sua internet — algumas informações podem estar desatualizadas até a conexão ser restabelecida.</p>
        <button onclick="window.location.reload()" type="button">Tentar novamente</button>
    </div>
</body>
</html>
